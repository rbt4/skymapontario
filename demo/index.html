<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07101a">
  <title>SkyMap Ontario — Interactive Demo</title>
  <meta name="description" content="Use the full SkyMap Ontario map directly in your laptop or mobile browser.">
  <link rel="canonical" href="https://rbt4.github.io/skymapontario/demo/">
  <link rel="icon" href="../assets/skymap-ontario-mark.svg" type="image/svg+xml">
  <style>
    :root{--bg:#07101a;--text:#f4f8fb;--line:rgba(255,255,255,.1);--cyan:#56d8ff;--green:#58e49e;--gold:#ffd36a}*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,sans-serif;overflow:hidden}.demo-shell{height:100dvh;display:grid;grid-template-rows:62px 1fr}.toolbar{position:relative;z-index:2;padding:0 max(14px,env(safe-area-inset-left));display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);background:rgba(6,15,24,.94);backdrop-filter:blur(22px)}.brand{display:flex;align-items:center;gap:10px;min-width:0;text-decoration:none;color:inherit}.brand img{width:39px;height:39px;border-radius:12px}.brand b{display:block;font-size:.86rem;letter-spacing:-.04em}.brand em{font-style:normal;color:var(--cyan)}.brand small{display:block;color:#657c8b;font-size:.44rem;letter-spacing:.14em;margin-top:3px}.demo-status{margin-left:auto;display:flex;align-items:center;gap:7px;color:#708695;font-size:.57rem}.demo-status:before{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 12px rgba(88,228,158,.5);content:""}.actions{display:flex;gap:6px}.actions a{display:inline-flex;align-items:center;justify-content:center;min-height:36px;padding:8px 11px;border:1px solid var(--line);border-radius:11px;color:#aebfc9;text-decoration:none;font-size:.59rem;font-weight:800}.actions .primary{border:0;background:linear-gradient(135deg,var(--cyan),#5687ff);color:#04131b}.actions .support{color:#e5bd70;border-color:rgba(255,211,106,.2)}iframe{display:block;width:100%;height:100%;border:0;background:#07101a}@media(max-width:680px){.demo-shell{grid-template-rows:54px 1fr}.toolbar{gap:7px;padding-inline:8px}.brand img{width:35px;height:35px}.brand small,.demo-status,.actions a:not(.primary){display:none}.actions{margin-left:auto}.actions a{min-height:34px;padding:7px 9px}.brand b{font-size:.76rem}}@media(max-width:390px){.brand span{display:none}}
  </style>
</head>
<body>
  <main class="demo-shell">
    <header class="toolbar">
      <a class="brand" href="../"><img src="../assets/skymap-ontario-mark.svg" alt=""><span><b>skymap <em>ontario</em></b><small>INTERACTIVE DEMO</small></span></a>
      <span class="demo-status">Live official data · no account</span>
      <nav class="actions" aria-label="Demo actions"><a class="support" href="https://ko-fi.com/rbt4dev" target="_blank" rel="noopener noreferrer">☕ Support</a><a href="../download/SkyMap-Ontario-v4.4.apk" download>Android 4.4</a><a class="primary" href="../app/">Full screen ↗</a></nav>
    </header>
    <iframe src="../app/?embed=1" title="SkyMap Ontario interactive live map" allow="geolocation; fullscreen"></iframe>
  </main>
</body>
</html>
