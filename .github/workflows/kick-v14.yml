name: Start SkyMap 14 release once

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch the SkyMap 14 release workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run materialize-v14.yml --repo "$GITHUB_REPOSITORY" --ref main
