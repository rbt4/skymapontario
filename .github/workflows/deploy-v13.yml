name: Validate, build and deploy SkyMap Ontario 13

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: skymap-pages-v13-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Import verified native source bundle
        run: |
          git fetch --no-tags --depth=1 origin skymap-8-predictive-map:refs/remotes/origin/skymap-8-predictive-map
          git checkout refs/remotes/origin/skymap-8-predictive-map -- .build/skymap10

      - name: Reconstruct verified native base
        run: |
          test "$(find .build/skymap10 -maxdepth 1 -type f -name 'part-*' | wc -l)" = "17"
          cat .build/skymap10/part-* > /tmp/skymap10.b64
          test "$(wc -c < /tmp/skymap10.b64)" = "29024"
          echo "2897fe53fd25647b55adf7dceffb9f7118939aab37331bde9442e332cc46fa0f  /tmp/skymap10.b64" | sha256sum -c -
          base64 -d /tmp/skymap10.b64 > /tmp/skymap10.tar.gz
          echo "fdaef2b84e05982338de4be4b45853ae1ab0a8f014c51e97b412f716745ee0cd  /tmp/skymap10.tar.gz" | sha256sum -c -
          tar -xzf /tmp/skymap10.tar.gz -C .

      - name: Apply verified SkyMap 13 overlay
        run: |
          test "$(find .build/skymap13 -maxdepth 1 -type f -name 'chunk-*' | wc -l)" = "6"
          cat .build/skymap13/chunk-* > /tmp/skymap13.b64
          test "$(wc -c < /tmp/skymap13.b64)" = "37164"
          echo "7b58b3275123c37b1b33a401a97b373a8ba58dc10bb069e8cc9b97d05e825156  /tmp/skymap13.b64" | sha256sum -c -
          base64 -d /tmp/skymap13.b64 > /tmp/skymap13.tar.gz
          echo "59eba3742bd2d52bf4cdec2ec9434f6edcf9106d6337b11da20d974677d37625  /tmp/skymap13.tar.gz" | sha256sum -c -
          tar -xzf /tmp/skymap13.tar.gz -C .

      - name: Apply verified product-site foundation
        run: |
          test "$(find .build/site12 -maxdepth 1 -type f -name 'chunk-*' | wc -l)" = "4"
          cat .build/site12/chunk-* > /tmp/site12.b64
          test "$(wc -c < /tmp/site12.b64)" = "23292"
          echo "021d7c54a053193703492149c58d18df93f396d1e3325b36348f83b53359420c  /tmp/site12.b64" | sha256sum -c -
          base64 -d /tmp/site12.b64 > /tmp/site12.tar.gz
          echo "6702823cdd92860035b3fb2cae5b926bf6a830466c0e5bab5db84f8785dcec38  /tmp/site12.tar.gz" | sha256sum -c -
          tar -xzf /tmp/site12.tar.gz -C .

      - name: Prepare and validate SkyMap 13
        run: |
          python scripts/prepare-v13.py
          bash scripts/verify-v13-source.sh
          bash scripts/verify-v13-radar.sh

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null

      - uses: gradle/actions/setup-gradle@v4

      - name: Restore stable development signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: skymap-ontario-debug-keystore-v1

      - name: Prepare development signing key
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=SkyMap Ontario Development,O=RBT4,C=CA"
          fi

      - name: Build SkyMap Ontario 13 APK
        run: ./gradlew :android-app:assembleDebug --stacktrace --no-daemon --console=plain

      - name: Verify APK and packaged radar recovery
        run: bash scripts/verify-v13-apk.sh

      - name: Prepare aligned Pages site and release
        run: |
          mkdir -p release _site/download
          cp android/app/build/outputs/apk/debug/android-app-debug.apk release/SkyMap-Ontario-v13.0-Radar-Recovery.apk
          (cd release && sha256sum SkyMap-Ontario-v13.0-Radar-Recovery.apk > SkyMap-Ontario-v13.0-Radar-Recovery.apk.sha256)
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gradle' \
            --exclude '.build' \
            --exclude 'android' \
            --exclude 'gradle' \
            --exclude 'gradlew' \
            --exclude 'gradlew.bat' \
            --exclude 'build.gradle' \
            --exclude 'settings.gradle' \
            --exclude 'gradle.properties' \
            --exclude 'release' \
            --exclude '_site' \
            --exclude 'demo' \
            ./ _site/
          cp release/SkyMap-Ontario-v13.0-Radar-Recovery.apk _site/download/
          cp release/SkyMap-Ontario-v13.0-Radar-Recovery.apk.sha256 _site/download/
          touch _site/.nojekyll
          test -f _site/index.html
          test -f _site/app/index.html
          test -f _site/download/SkyMap-Ontario-v13.0-Radar-Recovery.apk

      - uses: actions/upload-artifact@v4
        with:
          name: SkyMap-Ontario-v13.0-Radar-Recovery
          path: release/
          if-no-files-found: error
          retention-days: 30

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Deploy SkyMap Ontario 13
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record successful deployment
        uses: actions/github-script@v7
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            const branch = 'build-receipts';
            const path = 'latest.json';
            const receipt = {
              version: '13.0-radar-recovery',
              commit: context.sha,
              runId: context.runId,
              runAttempt: Number(process.env.GITHUB_RUN_ATTEMPT),
              artifact: 'SkyMap-Ontario-v13.0-Radar-Recovery',
              apk: `${process.env.PAGE_URL}download/SkyMap-Ontario-v13.0-Radar-Recovery.apk`,
              page: process.env.PAGE_URL,
              completedAt: new Date().toISOString()
            };
            let current;
            try {
              current = await github.rest.repos.getContent({ ...context.repo, path, ref: branch });
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              ...context.repo,
              path,
              branch,
              message: `Record successful SkyMap Ontario 13 deployment ${context.runId}`,
              content: Buffer.from(`${JSON.stringify(receipt, null, 2)}\n`).toString('base64'),
              sha: current?.data?.sha
            });
