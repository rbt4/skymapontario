name: Build SkyMap Ontario 11 Weather Theatre

on:
  push:
    branches: [skymap-8-predictive-map]
  pull_request:
  workflow_dispatch:

concurrency:
  group: skymap-v11-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Reconstruct verified SkyMap 10 native base
        run: |
          test "$(find .build/skymap10 -maxdepth 1 -type f -name 'part-*' | wc -l)" = "17"
          cat .build/skymap10/part-* > /tmp/skymap10-source.tar.gz.b64
          test "$(wc -c < /tmp/skymap10-source.tar.gz.b64)" = "29024"
          echo "2897fe53fd25647b55adf7dceffb9f7118939aab37331bde9442e332cc46fa0f  /tmp/skymap10-source.tar.gz.b64" | sha256sum -c -
          base64 -d /tmp/skymap10-source.tar.gz.b64 > /tmp/skymap10-source.tar.gz
          echo "fdaef2b84e05982338de4be4b45853ae1ab0a8f014c51e97b412f716745ee0cd  /tmp/skymap10-source.tar.gz" | sha256sum -c -
          tar -xzf /tmp/skymap10-source.tar.gz -C .

      - name: Apply verified SkyMap 11 Weather Theatre overlay
        run: |
          test "$(find .build/skymap11 -maxdepth 1 -type f -name 'part-*' | wc -l)" = "13"
          cat .build/skymap11/part-* > /tmp/skymap11-overlay.tar.gz.b64
          test "$(wc -c < /tmp/skymap11-overlay.tar.gz.b64)" = "28408"
          echo "90e44e7ca364a9cbffeba2cd9622767c9745a56503246121a1a0c660dba0ced2  /tmp/skymap11-overlay.tar.gz.b64" | sha256sum -c -
          base64 -d /tmp/skymap11-overlay.tar.gz.b64 > /tmp/skymap11-overlay.tar.gz
          echo "004a43651d9354b183a721a7ca7bc72132ab48b941a754a3c5bef0a3e574f0ff  /tmp/skymap11-overlay.tar.gz" | sha256sum -c -
          tar -xzf /tmp/skymap11-overlay.tar.gz -C .

      - name: Set SkyMap 11 Android identity
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          gradle = Path('android/app/build.gradle')
          text = gradle.read_text(encoding='utf-8')
          text = re.sub(r'versionCode\s+\d+', 'versionCode 110', text)
          text = re.sub(r"versionName\s+'[^']+'", "versionName '11.0-weather-theatre'", text)
          gradle.write_text(text, encoding='utf-8')
          main = Path('android/app/src/main/java/ca/skymapontario/app/MainActivity.java')
          text = main.read_text(encoding='utf-8')
          text = re.sub(r'SkyMapOntario/\d+(?:\.\d+)?', 'SkyMapOntario/11.0', text)
          main.write_text(text, encoding='utf-8')
          PY

      - name: Validate radar-first Weather Theatre
        run: |
          node --check app/v11-core.js
          node --check app/v11-radar.js
          node --check app/v11-ui.js
          grep -q 'SkyMap Ontario 11' app/index.html
          grep -q 'YOUR WEATHER MOVIE' app/index.html
          grep -q 'class="scene-track"' app/index.html
          grep -q 'id="movie-slider"' app/index.html
          grep -q 'GetFeatureInfo' app/v11-radar.js
          grep -q 'Radar_1km_RainPrecipRate-Extrapolation' app/v11-core.js
          grep -q 'HRDPS.CONTINENTAL_PR' app/v11-core.js
          grep -q 'GDPS_15km_PrecipType-Significant1h' app/v11-core.js
          grep -q 'GEPS.DIAG.12_PRMM.ERGE10' app/v11-core.js
          grep -q 'wind_direction_10m' app/v11-core.js
          grep -q 'buildEvents' app/v11-core.js
          grep -q 'SkyMapNative' app/v11-core.js
          grep -q 'SkyMapLocalIntelligence' app/v11-core.js
          grep -q 'weather-path' app/v11.css
          ! grep -q '<select' app/index.html
          grep -q 'WebViewAssetLoader' android/app/src/main/java/ca/skymapontario/app/MainActivity.java
          grep -q 'PeriodicWorkRequest' android/app/src/main/java/ca/skymapontario/app/MainActivity.java
          grep -q 'SQLiteOpenHelper' android/app/src/main/java/ca/skymapontario/app/SkyMapStore.java
          grep -q 'recordForecast' android/app/src/main/java/ca/skymapontario/app/SkyMapBridge.java
          grep -q 'archiveForecasts' android/app/src/main/java/ca/skymapontario/app/WeatherRefreshWorker.java
          test -f app/vendor/leaflet.js
          test -f app/vendor/leaflet.css

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null

      - uses: gradle/actions/setup-gradle@v4

      - name: Restore stable development signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: skymap-ontario-debug-keystore-v1

      - name: Prepare development signing key
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=SkyMap Ontario Development,O=RBT4,C=CA"
          fi

      - name: Build APK through Gradle
        id: gradle_build
        continue-on-error: true
        run: ./gradlew :android-app:assembleDebug --stacktrace --no-daemon --console=plain > /tmp/skymap-gradle.log 2>&1

      - name: Upload Gradle diagnostic
        if: steps.gradle_build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: SkyMap-v11-Gradle-Diagnostic
          path: /tmp/skymap-gradle.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after concise Gradle failure
        if: steps.gradle_build.outcome == 'failure'
        run: |
          tail -n 180 /tmp/skymap-gradle.log
          exit 1

      - name: Verify Android package and Weather Theatre
        run: |
          APK=android/app/build/outputs/apk/debug/android-app-debug.apk
          test -s "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/zipalign" -c -P 16 -v 4 "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | tee /tmp/badging.txt
          grep -q "versionCode='110'" /tmp/badging.txt
          grep -q "versionName='11.0-weather-theatre'" /tmp/badging.txt
          unzip -p "$APK" assets/index.html | grep -q 'SkyMap Ontario 11'
          unzip -p "$APK" assets/index.html | grep -q 'YOUR WEATHER MOVIE'
          unzip -p "$APK" assets/v11-radar.js | grep -q 'GetFeatureInfo'
          unzip -p "$APK" assets/v11-core.js | grep -q 'SkyMapLocalIntelligence'
          unzip -p "$APK" assets/v11-ui.js | grep -q 'renderScenes'
          unzip -p "$APK" assets/v11.css | grep -q '.scene-card'

      - name: Prepare release
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/android-app-debug.apk release/SkyMap-Ontario-v11.0-Weather-Theatre.apk
          cd release
          sha256sum SkyMap-Ontario-v11.0-Weather-Theatre.apk > SkyMap-Ontario-v11.0-Weather-Theatre.apk.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: SkyMap-Ontario-v11.0-Weather-Theatre
          path: release/
          if-no-files-found: error
          retention-days: 30
