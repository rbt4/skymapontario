name: Build SkyMap Ontario 10 Local Intelligence

on:
  push:
    branches: [skymap-8-predictive-map]
  pull_request:
  workflow_dispatch:

concurrency:
  group: skymap-v10-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Reconstruct verified SkyMap 10 source
        run: |
          test "$(find .build/skymap10 -maxdepth 1 -type f -name 'part-*' | wc -l)" = "17"
          cat .build/skymap10/part-* > /tmp/skymap10-source.tar.gz.b64
          test "$(wc -c < /tmp/skymap10-source.tar.gz.b64)" = "29024"
          echo "2897fe53fd25647b55adf7dceffb9f7118939aab37331bde9442e332cc46fa0f  /tmp/skymap10-source.tar.gz.b64" | sha256sum -c -
          base64 -d /tmp/skymap10-source.tar.gz.b64 > /tmp/skymap10-source.tar.gz
          echo "fdaef2b84e05982338de4be4b45853ae1ab0a8f014c51e97b412f716745ee0cd  /tmp/skymap10-source.tar.gz" | sha256sum -c -
          tar -xzf /tmp/skymap10-source.tar.gz -C .

      - name: Validate local-intelligence experience
        run: |
          node --check app/v10.js
          grep -q 'SkyMap Ontario 10' app/index.html
          grep -q 'class="snapshots"' app/index.html
          grep -q 'id="deep-sheet"' app/index.html
          grep -q 'ON-DEVICE MEMORY' app/index.html
          grep -q 'SkyMapNative' app/v10.js
          grep -q 'SkyMapLocalIntelligence' app/v10.js
          grep -q 'zoomControl:false' app/v10.js
          grep -q 'Radar_1km_RainPrecipRate-Extrapolation' app/v10.js
          grep -q 'HRDPS.CONTINENTAL_PR' app/v10.js
          grep -q 'GDPS_15km_PrecipType-Significant1h' app/v10.js
          grep -q 'GEPS.DIAG.12_PRMM.ERGE10' app/v10.js
          grep -q 'RAQDPS.SFC_PM2.5' app/v10.js
          grep -q 'collections/swob-realtime' app/v10.js
          ! grep -q '<select' app/index.html
          grep -q 'WebViewAssetLoader' android/app/src/main/java/ca/skymapontario/app/MainActivity.java
          grep -q 'PeriodicWorkRequest' android/app/src/main/java/ca/skymapontario/app/MainActivity.java
          grep -q 'SQLiteOpenHelper' android/app/src/main/java/ca/skymapontario/app/SkyMapStore.java
          grep -q 'recordForecast' android/app/src/main/java/ca/skymapontario/app/SkyMapBridge.java
          grep -q 'archiveForecasts' android/app/src/main/java/ca/skymapontario/app/WeatherRefreshWorker.java
          grep -q 'refreshObservation' android/app/src/main/java/ca/skymapontario/app/WeatherRefreshWorker.java
          test -f app/vendor/leaflet.js
          test -f app/vendor/leaflet.css

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - uses: gradle/actions/setup-gradle@v4

      - name: Restore stable development signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: skymap-ontario-debug-keystore-v1

      - name: Prepare development signing key
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=SkyMap Ontario Development,O=RBT4,C=CA"
          fi

      - name: Build APK through Gradle
        run: ./gradlew :android-app:assembleDebug --stacktrace --no-daemon

      - name: Verify Android package and local engine
        run: |
          APK=android/app/build/outputs/apk/debug/android-app-debug.apk
          test -s "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/zipalign" -c -P 16 -v 4 "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | tee /tmp/badging.txt
          grep -q "versionCode='100'" /tmp/badging.txt
          grep -q "versionName='10.0-local-intelligence'" /tmp/badging.txt
          unzip -p "$APK" assets/index.html | grep -q 'SkyMap Ontario 10'
          unzip -p "$APK" assets/v10.js | grep -q 'SkyMapLocalIntelligence'
          unzip -p "$APK" assets/v10.js | grep -q 'collections/swob-realtime'
          unzip -p "$APK" assets/v10.css | grep -q '.snapshot-card'

      - name: Prepare release
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/android-app-debug.apk release/SkyMap-Ontario-v10.0-Local-Intelligence.apk
          cd release
          sha256sum SkyMap-Ontario-v10.0-Local-Intelligence.apk > SkyMap-Ontario-v10.0-Local-Intelligence.apk.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: SkyMap-Ontario-v10.0-Local-Intelligence
          path: release/
          if-no-files-found: error
          retention-days: 30
