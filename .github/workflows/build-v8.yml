name: Build SkyMap Ontario 8 Predictive

on:
  push:
    branches: [skymap-8-predictive-map]
  pull_request:
  workflow_dispatch:

concurrency:
  group: skymap-v8-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore tested predictive-map sources
        run: |
          base64 -d .build/skymap8-source.tar.gz.b64 > /tmp/skymap8-source.tar.gz
          echo "431a0db5e0cf6ba6af1138de7c6fb12bb2ca111d4b05c9a4489012789d4c1961  /tmp/skymap8-source.tar.gz" | sha256sum -c -
          tar -xzf /tmp/skymap8-source.tar.gz -C app
          node --check app/app.js
          grep -q "SKYMAP WEATHER STORY" app/index.html
          grep -q "ecmwf_aifs025_single" app/app.js
          grep -q "Lightning_2.5km_Density" app/app.js
          grep -q "mode==='smoke'||!state.mapReady" app/app.js
          test -f app/vendor/leaflet.js
          test -f app/vendor/leaflet.css

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - uses: gradle/actions/setup-gradle@v4

      - name: Restore stable development signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: skymap-ontario-debug-keystore-v1

      - name: Prepare development signing key
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=SkyMap Ontario Development,O=RBT4,C=CA"
          fi

      - name: Build APK through Gradle
        run: ./gradlew :android-app:assembleDebug --stacktrace --no-daemon

      - name: Verify Android package and bundled experience
        run: |
          APK=android/app/build/outputs/apk/debug/android-app-debug.apk
          test -s "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/zipalign" -c -P 16 -v 4 "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | tee /tmp/badging.txt
          grep -q "versionCode='80'" /tmp/badging.txt
          grep -q "versionName='8.0-predictive'" /tmp/badging.txt
          unzip -p "$APK" assets/index.html | grep -q "SKYMAP WEATHER STORY"
          unzip -p "$APK" assets/app.js | grep -q "ecmwf_aifs025_single"
          unzip -p "$APK" assets/app.js | grep -q "Lightning_2.5km_Density"

      - name: Prepare release
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/android-app-debug.apk release/SkyMap-Ontario-v8.0-Predictive.apk
          cd release
          sha256sum SkyMap-Ontario-v8.0-Predictive.apk > SkyMap-Ontario-v8.0-Predictive.apk.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: SkyMap-Ontario-v8.0-Predictive
          path: release/
          if-no-files-found: error
          retention-days: 30
