name: Build SkyMap Ontario 8.1 Visual Timeline

on:
  push:
    branches: [skymap-8-predictive-map]
  pull_request:
  workflow_dispatch:

concurrency:
  group: skymap-v81-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Assemble SkyMap 8.1 source bundle
        run: |
          cat .build/skymap81-parts/part-* > /tmp/skymap81-source.tar.gz.b64
          echo "Bundle characters: $(wc -c < /tmp/skymap81-source.tar.gz.b64)"
          test "$(wc -c < /tmp/skymap81-source.tar.gz.b64)" = "89200"

      - name: Verify SkyMap 8.1 source bundle
        run: |
          base64 -d /tmp/skymap81-source.tar.gz.b64 > /tmp/skymap81-source.tar.gz
          sha256sum /tmp/skymap81-source.tar.gz
          echo "be22272146af3548cfa95e8d54d717345fce4a603c839a2730b088b3eb008345  /tmp/skymap81-source.tar.gz" | sha256sum -c -

      - name: Restore SkyMap 8.1 app
        run: |
          tar -xzf /tmp/skymap81-source.tar.gz -C app
          node --check app/app.js
          test -f app/vendor/leaflet.js
          test -f app/vendor/leaflet.css

      - name: Verify visual timeline and predictive layers
        run: |
          grep -q "SkyMap Ontario 8.1" app/index.html
          grep -q 'class="mode-strip"' app/index.html
          grep -q "Radar_1km_RainPrecipRate-Extrapolation" app/app.js
          grep -q "GDPS_15km_PrecipType-Significant1h" app/app.js
          grep -q "GEPS.DIAG.12_PRMM.ERGE10" app/app.js

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - uses: gradle/actions/setup-gradle@v4

      - name: Restore stable development signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: skymap-ontario-debug-keystore-v1

      - name: Prepare development signing key
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=SkyMap Ontario Development,O=RBT4,C=CA"
          fi

      - name: Build APK through Gradle
        run: ./gradlew :android-app:assembleDebug --stacktrace --no-daemon

      - name: Verify Android package and visual timeline experience
        run: |
          APK=android/app/build/outputs/apk/debug/android-app-debug.apk
          test -s "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/zipalign" -c -P 16 -v 4 "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | tee /tmp/badging.txt
          grep -q "versionCode='81'" /tmp/badging.txt
          grep -q "versionName='8.1-visual-timeline'" /tmp/badging.txt
          unzip -p "$APK" assets/index.html | grep -q "SkyMap Ontario 8.1"
          unzip -p "$APK" assets/index.html | grep -q 'class="mode-strip"'
          unzip -p "$APK" assets/app.js | grep -q "Radar_1km_RainPrecipRate-Extrapolation"
          unzip -p "$APK" assets/app.js | grep -q "GDPS_15km_PrecipType-Significant1h"
          unzip -p "$APK" assets/app.js | grep -q "GEPS.DIAG.12_PRMM.ERGE10"

      - name: Prepare release
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/android-app-debug.apk release/SkyMap-Ontario-v8.1-Visual-Timeline.apk
          cd release
          sha256sum SkyMap-Ontario-v8.1-Visual-Timeline.apk > SkyMap-Ontario-v8.1-Visual-Timeline.apk.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: SkyMap-Ontario-v8.1-Visual-Timeline
          path: release/
          if-no-files-found: error
          retention-days: 30
