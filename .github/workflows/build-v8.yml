name: Build SkyMap Ontario 9 Weather Lens

on:
  push:
    branches: [skymap-8-predictive-map]
  pull_request:
  workflow_dispatch:

concurrency:
  group: skymap-v9-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate weather-lens source
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('app/v9.js')
          s = p.read_text(encoding='utf-8')
          old = "function weight(id,h){if(h.hours<=48)return{id:'gem',w:.46}[id]? .46:"
          new = "function weight(id,h){if(h.hours<=48)return id==='gem'?.46:"
          if old in s:
              s = s.replace(old, new)
              p.write_text(s, encoding='utf-8')
          PY
          node --check app/v9.js
          grep -q 'SkyMap Ontario 9' app/index.html
          grep -q 'class="snapshots"' app/index.html
          grep -q 'class="mode-strip"' app/index.html
          grep -q 'zoomControl:false' app/v9.js
          grep -q 'Radar_1km_RainPrecipRate-Extrapolation' app/v9.js
          grep -q 'HRDPS.CONTINENTAL_PR' app/v9.js
          grep -q 'GDPS_15km_PrecipType-Significant1h' app/v9.js
          grep -q 'GEPS.DIAG.12_PRMM.ERGE10' app/v9.js
          grep -q 'ecmwf_aifs025_single' app/v9.js
          ! grep -q '<select' app/index.html
          test -f app/vendor/leaflet.js
          test -f app/vendor/leaflet.css

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - uses: gradle/actions/setup-gradle@v4

      - name: Restore stable development signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: skymap-ontario-debug-keystore-v1

      - name: Prepare development signing key
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=SkyMap Ontario Development,O=RBT4,C=CA"
          fi

      - name: Build APK through Gradle
        run: ./gradlew :android-app:assembleDebug --stacktrace --no-daemon

      - name: Verify Android package and weather-lens experience
        run: |
          APK=android/app/build/outputs/apk/debug/android-app-debug.apk
          test -s "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/zipalign" -c -P 16 -v 4 "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | tee /tmp/badging.txt
          grep -q "versionCode='90'" /tmp/badging.txt
          grep -q "versionName='9.0-weather-lens'" /tmp/badging.txt
          unzip -p "$APK" assets/index.html | grep -q 'SkyMap Ontario 9'
          unzip -p "$APK" assets/v9.js | grep -q 'Radar_1km_RainPrecipRate-Extrapolation'
          unzip -p "$APK" assets/v9.js | grep -q 'ecmwf_aifs025_single'
          unzip -p "$APK" assets/v9.css | grep -q '.confidence-orbit'

      - name: Prepare release
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/android-app-debug.apk release/SkyMap-Ontario-v9.0-Weather-Lens.apk
          cd release
          sha256sum SkyMap-Ontario-v9.0-Weather-Lens.apk > SkyMap-Ontario-v9.0-Weather-Lens.apk.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: SkyMap-Ontario-v9.0-Weather-Lens
          path: release/
          if-no-files-found: error
          retention-days: 30