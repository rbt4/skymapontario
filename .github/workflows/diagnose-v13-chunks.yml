name: Diagnose SkyMap 13 chunks
on:
  pull_request:
  workflow_dispatch:
jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Write chunk fingerprints
        run: |
          mkdir -p /tmp/chunk-diagnostics
          find .build/skymap13 -maxdepth 1 -type f -name 'chunk-*' -printf '%f %s bytes\n' | sort > /tmp/chunk-diagnostics/fingerprints.txt
          sha256sum .build/skymap13/chunk-* | sort -k2 >> /tmp/chunk-diagnostics/fingerprints.txt
      - uses: actions/upload-artifact@v4
        with:
          name: SkyMap-v13-chunk-diagnostics
          path: /tmp/chunk-diagnostics/fingerprints.txt
          if-no-files-found: error
          retention-days: 1
