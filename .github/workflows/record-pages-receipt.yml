name: Record SkyMap 12 Pages receipt

on:
  workflow_run:
    workflows: ["Validate, build and deploy SkyMap Ontario 12"]
    types: [completed]

permissions:
  contents: write

jobs:
  record:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Publish successful deployment receipt
        uses: actions/github-script@v7
        with:
          script: |
            const branch = 'build-receipts';
            const path = 'latest.json';
            const run = context.payload.workflow_run;
            const page = 'https://rbt4.github.io/skymapontario/';
            const receipt = {
              version: '12.0-radar-forecast',
              commit: run.head_sha,
              runId: run.id,
              runAttempt: run.run_attempt,
              artifact: 'SkyMap-Ontario-v12.0-Radar-Forecast',
              apk: `${page}download/SkyMap-Ontario-v12.0-Radar-Forecast.apk`,
              page,
              completedAt: run.updated_at
            };
            try {
              await github.rest.git.getRef({ ...context.repo, ref: `heads/${branch}` });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.git.createRef({ ...context.repo, ref: `refs/heads/${branch}`, sha: run.head_sha });
            }
            let current;
            try {
              current = await github.rest.repos.getContent({ ...context.repo, path, ref: branch });
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              ...context.repo,
              path,
              branch,
              message: `Record successful SkyMap Ontario 12 deployment ${run.id}`,
              content: Buffer.from(`${JSON.stringify(receipt, null, 2)}\n`).toString('base64'),
              sha: current?.data?.sha
            });
