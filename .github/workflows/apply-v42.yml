name: Apply SkyMap Ontario 4.2 polish

on:
  push:
    paths:
      - 'release/sky42.part*'

permissions:
  contents: write

concurrency:
  group: apply-v42
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release parts
        id: parts
        shell: bash
        run: |
          if [[ -f release/sky42.part00 && -f release/sky42.part01 && -f release/sky42.part02 ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply polished release
        if: steps.parts.outputs.ready == 'true'
        shell: bash
        run: |
          cat release/sky42.part* | base64 --decode > /tmp/skymap-v42.zip
          unzip -o /tmp/skymap-v42.zip -d .
          rm -rf release
          rm -f .github/workflows/apply-v42.yml
          git config user.name "SkyMap Ontario Release"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Polish SkyMap Ontario 4.2"
          git push
