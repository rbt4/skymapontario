name: Start SkyMap 14 from guarded PR

on:
  pull_request_target:
    branches: [main]
    types: [opened]

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'run-skymap14-release'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch the trusted main release workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run materialize-v14.yml --repo "$GITHUB_REPOSITORY" --ref main
