name: Build and deploy SkyMap Ontario

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: skymap-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Align and validate the readable release source
        run: |
          node scripts/prepare-release.mjs
          node --check assets/site.js
          node --check app/app.js
          node scripts/validate-release.mjs
          grep -q "android.useAndroidX=true" gradle.properties

      - name: Verify every live source used by the product
        run: node scripts/check-live-sources.mjs

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null

      - uses: gradle/actions/setup-gradle@v4

      - name: Restore stable development signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: skymap-ontario-debug-keystore-v1

      - name: Prepare development signing key
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=SkyMap Ontario Development,O=RBT4,C=CA"
          fi

      - name: Build Android APK
        id: gradle_build
        continue-on-error: true
        run: ./gradlew :android-app:assembleDebug --stacktrace --no-daemon --console=plain > /tmp/skymap-gradle.log 2>&1

      - name: Upload Gradle diagnostic
        if: steps.gradle_build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: SkyMap-Gradle-Diagnostic
          path: /tmp/skymap-gradle.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after concise Gradle failure
        if: steps.gradle_build.outcome == 'failure'
        run: |
          tail -n 180 /tmp/skymap-gradle.log
          exit 1

      - name: Verify APK and packaged experience
        run: |
          APK=android/app/build/outputs/apk/debug/android-app-debug.apk
          test -s "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/zipalign" -c -P 16 -v 4 "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | tee /tmp/badging.txt
          grep -q "versionCode='${SKYMAP_VERSION_CODE}'" /tmp/badging.txt
          grep -q "versionName='${SKYMAP_VERSION}'" /tmp/badging.txt
          rm -rf /tmp/apk-inspect && mkdir /tmp/apk-inspect
          unzip -q "$APK" -d /tmp/apk-inspect
          grep -q 'WEATHER SNAPSHOTS' /tmp/apk-inspect/assets/index.html
          grep -q '7-DAY FORECAST' /tmp/apk-inspect/assets/index.html
          grep -q 'Promise.allSettled' /tmp/apk-inspect/assets/app.js
          grep -q 'NATIVE_GEOMET' /tmp/apk-inspect/assets/app.js
          grep -q "${SKYMAP_VERSION}" /tmp/apk-inspect/assets/version.json
          strings /tmp/apk-inspect/classes*.dex > /tmp/classes.txt
          grep -q 'GeoMetProxy' /tmp/classes.txt
          grep -q 'geomet-proxy' /tmp/classes.txt

      - name: Prepare lean website and release files
        run: |
          mkdir -p release _site/assets _site/app _site/download
          APK=android/app/build/outputs/apk/debug/android-app-debug.apk
          cp "$APK" "release/${SKYMAP_APK}"
          (cd release && sha256sum "${SKYMAP_APK}" > "${SKYMAP_APK}.sha256")
          cp "release/${SKYMAP_APK}" release/SkyMap-Ontario-latest.apk
          cp "release/${SKYMAP_APK}.sha256" release/SkyMap-Ontario-latest.apk.sha256
          cp index.html privacy.html version.json _site/
          cp assets/site.css assets/site.js _site/assets/
          cp -a app/. _site/app/
          cp "release/${SKYMAP_APK}" "release/${SKYMAP_APK}.sha256" release/SkyMap-Ontario-latest.apk release/SkyMap-Ontario-latest.apk.sha256 _site/download/
          node - <<'NODE'
          const fs = require('fs');
          const version = JSON.parse(fs.readFileSync('version.json'));
          fs.writeFileSync('_site/release.json', JSON.stringify({ ...version, commit: process.env.GITHUB_SHA, runId: process.env.GITHUB_RUN_ID, completedAt: new Date().toISOString() }, null, 2));
          NODE
          touch _site/.nojekyll
          test -f _site/index.html
          test -f _site/app/app.js
          test -f "_site/download/${SKYMAP_APK}"
          test ! -f _site/.build/skymap13/chunk-00

      - uses: actions/upload-artifact@v4
        with:
          name: SkyMap-Ontario-${{ env.SKYMAP_VERSION }}
          path: release/
          if-no-files-found: error
          retention-days: 30

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy SkyMap Ontario
        id: deployment
        uses: actions/deploy-pages@v4
