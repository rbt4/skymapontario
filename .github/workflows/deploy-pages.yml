name: Deploy SkyMap Ontario

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct Android APK
        run: |
          mkdir -p download
          if compgen -G "artifacts/apk.part*" > /dev/null; then
            cat artifacts/apk.part* | base64 --decode > download/SkyMap-Ontario-v4.1-WOW.apk
          fi
      - name: Prepare Pages artifact
        run: |
          rm -rf _site
          mkdir _site
          rsync -a --exclude '.git' --exclude '.github' --exclude 'artifacts' --exclude '_site' ./ _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
