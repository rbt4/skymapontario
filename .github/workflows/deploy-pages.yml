name: Validate, build and deploy SkyMap Ontario 13

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: skymap-pages-v13-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Import verified native source bundle
        run: |
          git fetch --no-tags --depth=1 origin skymap-8-predictive-map:refs/remotes/origin/skymap-8-predictive-map
          git checkout refs/remotes/origin/skymap-8-predictive-map -- .build/skymap10

      - name: Reconstruct verified SkyMap 10 native base
        run: |
          test "$(find .build/skymap10 -maxdepth 1 -type f -name 'part-*' | wc -l)" = "17"
          cat .build/skymap10/part-* > /tmp/skymap10-source.tar.gz.b64
          test "$(wc -c < /tmp/skymap10-source.tar.gz.b64)" = "29024"
          echo "2897fe53fd25647b55adf7dceffb9f7118939aab37331bde9442e332cc46fa0f  /tmp/skymap10-source.tar.gz.b64" | sha256sum -c -
          base64 -d /tmp/skymap10-source.tar.gz.b64 > /tmp/skymap10-source.tar.gz
          echo "fdaef2b84e05982338de4be4b45853ae1ab0a8f014c51e97b412f716745ee0cd  /tmp/skymap10-source.tar.gz" | sha256sum -c -
          tar -xzf /tmp/skymap10-source.tar.gz -C .

      - name: Apply verified SkyMap 13 radar recovery overlay
        run: |
          echo "Overlay chunks: $(find .build/skymap13 -maxdepth 1 -type f -name 'chunk-*' | wc -l)"
          find .build/skymap13 -maxdepth 1 -type f -name 'chunk-*' -printf '%f %s bytes\n' | sort
          test "$(find .build/skymap13 -maxdepth 1 -type f -name 'chunk-*' | wc -l)" = "6"
          cat .build/skymap13/chunk-* > /tmp/skymap13-overlay.tar.gz.b64
          test "$(wc -c < /tmp/skymap13-overlay.tar.gz.b64)" = "37164"
          echo "7b58b3275123c37b1b33a401a97b373a8ba58dc10bb069e8cc9b97d05e825156  /tmp/skymap13-overlay.tar.gz.b64" | sha256sum -c -
          base64 -d /tmp/skymap13-overlay.tar.gz.b64 > /tmp/skymap13-overlay.tar.gz
          echo "59eba3742bd2d52bf4cdec2ec9434f6edcf9106d6337b11da20d974677d37625  /tmp/skymap13-overlay.tar.gz" | sha256sum -c -
          tar -xzf /tmp/skymap13-overlay.tar.gz -C .

      - name: Apply verified product-site foundation
        run: |
          test "$(find .build/site12 -maxdepth 1 -type f -name 'chunk-*' | wc -l)" = "4"
          cat .build/site12/chunk-* > /tmp/skymap-site-overlay.tar.gz.b64
          test "$(wc -c < /tmp/skymap-site-overlay.tar.gz.b64)" = "23292"
          echo "021d7c54a053193703492149c58d18df93f396d1e3325b36348f83b53359420c  /tmp/skymap-site-overlay.tar.gz.b64" | sha256sum -c -
          base64 -d /tmp/skymap-site-overlay.tar.gz.b64 > /tmp/skymap-site-overlay.tar.gz
          echo "6702823cdd92860035b3fb2cae5b926bf6a830466c0e5bab5db84f8785dcec38  /tmp/skymap-site-overlay.tar.gz" | sha256sum -c -
          tar -xzf /tmp/skymap-site-overlay.tar.gz -C .

      - name: Align product site and Android identity to SkyMap 13
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          gradle = Path('android/app/build.gradle')
          text = gradle.read_text(encoding='utf-8')
          text = re.sub(r'versionCode\s+\d+', 'versionCode 130', text)
          text = re.sub(r"versionName\s+'[^']+'", "versionName '13.0-radar-recovery'", text)
          gradle.write_text(text, encoding='utf-8')

          for path in [Path('index.html'), Path('privacy.html'), Path('assets/site.js')]:
              if not path.exists():
                  continue
              content = path.read_text(encoding='utf-8')
              content = content.replace('SkyMap Ontario 12', 'SkyMap Ontario 13')
              content = content.replace('v12.0-Radar-Forecast', 'v13.0-Radar-Recovery')
              content = content.replace('12.0-radar-forecast', '13.0-radar-recovery')
              content = content.replace('Version 12', 'Version 13')
              path.write_text(content, encoding='utf-8')

          page = Path('index.html')
          content = page.read_text(encoding='utf-8')
          proof = '''
          <section class="relay-proof section" id="reliability">
            <div class="relay-proof-card reveal">
              <div><small>RADAR THAT FAILS HONESTLY</small><h2>Two routes to the same official radar.</h2><p>The Android app requests ECCC GeoMet through a tightly restricted native relay, then tries the direct public connection as a fallback. The web app uses the direct feed. SkyMap keeps the last successful image instead of replacing weather with a blank map.</p></div>
              <div class="relay-flow" aria-label="Radar reliability architecture"><span>Official ECCC GeoMet</span><i>→</i><span>Native relay or direct web</span><i>→</i><strong>One verified radar image</strong></div>
            </div>
          </section>
          '''
          if 'id="reliability"' not in content:
              content = content.replace('</main>', proof + '\n</main>')
          page.write_text(content, encoding='utf-8')

          css = Path('assets/site-base.css')
          styles = css.read_text(encoding='utf-8')
          addition = '''
          .relay-proof{padding-top:28px}.relay-proof-card{display:grid;padding:46px;grid-template-columns:1.05fr .95fr;align-items:center;gap:54px;border:1px solid rgba(99,221,255,.16);border-radius:28px;background:radial-gradient(circle at 100% 0,rgba(99,221,255,.11),transparent 40%),linear-gradient(145deg,#0d1b28,#07121c)}.relay-proof-card small{color:#63ddff;font:800 9px/1 Manrope,sans-serif;letter-spacing:1.7px}.relay-proof-card h2{margin:10px 0 14px;font:700 clamp(31px,3.3vw,48px)/1.03 Manrope,sans-serif;letter-spacing:-2.3px}.relay-proof-card p{max-width:590px;margin:0;color:#93a6b4;font-size:13px;line-height:1.7}.relay-flow{display:grid;gap:9px;padding:18px;border:1px solid rgba(255,255,255,.09);border-radius:19px;background:rgba(255,255,255,.025);text-align:center}.relay-flow span,.relay-flow strong{padding:13px;border-radius:13px;background:rgba(99,221,255,.07);font-size:11px}.relay-flow strong{color:#dcff7a;background:rgba(220,255,122,.08)}.relay-flow i{color:#63ddff;font-style:normal}@media(max-width:800px){.relay-proof-card{grid-template-columns:1fr;padding:30px 23px;gap:28px}}
          '''
          if '.relay-proof-card' not in styles:
              css.write_text(styles + '\n' + addition, encoding='utf-8')
          PY

      - name: Validate refined app and radar transport
        run: |
          node --check assets/site.js
          node --check app/v13-core.js
          node --check app/v13-radar.js
          node --check app/v13-ui.js
          grep -q 'SkyMap Ontario 13' app/index.html
          grep -q 'WHAT MATTERS NEXT' app/index.html
          grep -q '7-DAY FORECAST' app/index.html
          grep -q 'class="daily-list"' app/index.html
          grep -q 'geomet-proxy' app/v13-core.js
          grep -q "layer: layerName" app/v13-radar.js
          grep -q 'RADAR_COVERAGE_RRAI.INV' app/v13-radar.js
          grep -q 'L.imageOverlay' app/v13-radar.js
          grep -q 'DIM_REFERENCE_TIME' app/v13-radar.js
          grep -q 'Keeping the last successful' app/v13-ui.js
          grep -q 'buildDailyForecasts' app/v13-ui.js
          ! grep -q 'crossOrigin:true' app/v13-radar.js
          grep -q 'class GeoMetProxy' android/app/src/main/java/ca/skymapontario/app/GeoMetProxy.java
          grep -q 'geoMetProxy.fetch' android/app/src/main/java/ca/skymapontario/app/MainActivity.java
          grep -q 'WebViewAssetLoader' android/app/src/main/java/ca/skymapontario/app/MainActivity.java
          grep -q 'Two routes to the same official radar' index.html
          grep -q 'SkyMap-Ontario-v13.0-Radar-Recovery.apk' index.html
          ! grep -q 'SkyMap-Ontario-v12.0-Radar-Forecast.apk' index.html
          test -f app/vendor/leaflet.js
          test -f app/vendor/leaflet.css
          test "$(grep -c 'id="radar-status"' app/index.html)" = "1"
          test "$(grep -c 'id="daily-rail"' app/index.html)" = "1"

      - name: Verify live ECCC radar and nowcast images
        run: |
          set -euo pipefail
          curl --fail --location --retry 4 --retry-all-errors --connect-timeout 15 --max-time 90 \
            --get 'https://geo.weather.gc.ca/geomet' \
            --data-urlencode 'service=WMS' \
            --data-urlencode 'version=1.3.0' \
            --data-urlencode 'request=GetCapabilities' \
            --data-urlencode 'layer=RADAR_1KM_RRAI' \
            --output /tmp/radar-capabilities.xml
          grep -q 'RADAR_1KM_RRAI' /tmp/radar-capabilities.xml
          grep -qi 'time' /tmp/radar-capabilities.xml

          fetch_png() {
            local layer="$1"
            local style="$2"
            local output="$3"
            curl --fail --location --retry 4 --retry-all-errors --connect-timeout 15 --max-time 90 \
              --get 'https://geo.weather.gc.ca/geomet' \
              --data-urlencode 'SERVICE=WMS' \
              --data-urlencode 'VERSION=1.3.0' \
              --data-urlencode 'REQUEST=GetMap' \
              --data-urlencode "LAYERS=${layer}" \
              --data-urlencode "STYLES=${style}" \
              --data-urlencode 'CRS=EPSG:4326' \
              --data-urlencode 'BBOX=41,-84,47,-74' \
              --data-urlencode 'WIDTH=720' \
              --data-urlencode 'HEIGHT=540' \
              --data-urlencode 'FORMAT=image/png' \
              --data-urlencode 'TRANSPARENT=TRUE' \
              --output "$output"
          }
          fetch_png 'RADAR_1KM_RRAI' 'RADARURPPRECIPR14-LINEAR' /tmp/radar.png
          fetch_png 'Radar_1km_RainPrecipRate-Extrapolation' '' /tmp/nowcast.png
          python - <<'PY'
          from pathlib import Path
          import struct
          for name in ('radar', 'nowcast'):
              data = Path(f'/tmp/{name}.png').read_bytes()
              assert data[:8] == b'\x89PNG\r\n\x1a\n', f'{name} is not PNG'
              width, height = struct.unpack('>II', data[16:24])
              assert (width, height) == (720, 540), (name, width, height)
              assert len(data) > 500, f'{name} image is unexpectedly small'
              print(name, len(data), width, height)
          PY

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null

      - uses: gradle/actions/setup-gradle@v4

      - name: Restore stable development signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: skymap-ontario-debug-keystore-v1

      - name: Prepare development signing key
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=SkyMap Ontario Development,O=RBT4,C=CA"
          fi

      - name: Build SkyMap Ontario 13 APK
        id: gradle_build
        continue-on-error: true
        run: ./gradlew :android-app:assembleDebug --stacktrace --no-daemon --console=plain > /tmp/skymap-gradle.log 2>&1

      - name: Upload Gradle diagnostic
        if: steps.gradle_build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: SkyMap-v13-Gradle-Diagnostic
          path: /tmp/skymap-gradle.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after concise Gradle failure
        if: steps.gradle_build.outcome == 'failure'
        run: |
          tail -n 200 /tmp/skymap-gradle.log
          exit 1

      - name: Verify APK and packaged radar recovery
        run: |
          APK=android/app/build/outputs/apk/debug/android-app-debug.apk
          test -s "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/zipalign" -c -P 16 -v 4 "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | tee /tmp/badging.txt
          grep -q "versionCode='130'" /tmp/badging.txt
          grep -q "versionName='13.0-radar-recovery'" /tmp/badging.txt
          unzip -p "$APK" assets/index.html | grep -q 'WHAT MATTERS NEXT'
          unzip -p "$APK" assets/index.html | grep -q '7-DAY FORECAST'
          unzip -p "$APK" assets/v13-radar.js | grep -q 'L.imageOverlay'
          unzip -p "$APK" assets/v13-radar.js | grep -q 'RADAR_COVERAGE_RRAI.INV'
          unzip -p "$APK" assets/v13-ui.js | grep -q 'buildDailyForecasts'
          unzip -p "$APK" classes.dex | strings | grep -q 'GeoMetProxy'

      - name: Prepare aligned Pages site and release
        run: |
          mkdir -p release _site/download
          cp android/app/build/outputs/apk/debug/android-app-debug.apk release/SkyMap-Ontario-v13.0-Radar-Recovery.apk
          (cd release && sha256sum SkyMap-Ontario-v13.0-Radar-Recovery.apk > SkyMap-Ontario-v13.0-Radar-Recovery.apk.sha256)
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gradle' \
            --exclude '.build' \
            --exclude 'android' \
            --exclude 'gradle' \
            --exclude 'gradlew' \
            --exclude 'gradlew.bat' \
            --exclude 'build.gradle' \
            --exclude 'settings.gradle' \
            --exclude 'gradle.properties' \
            --exclude 'release' \
            --exclude '_site' \
            --exclude 'demo' \
            ./ _site/
          cp release/SkyMap-Ontario-v13.0-Radar-Recovery.apk _site/download/
          cp release/SkyMap-Ontario-v13.0-Radar-Recovery.apk.sha256 _site/download/
          touch _site/.nojekyll
          test -f _site/index.html
          test -f _site/app/index.html
          test -f _site/download/SkyMap-Ontario-v13.0-Radar-Recovery.apk

      - uses: actions/upload-artifact@v4
        with:
          name: SkyMap-Ontario-v13.0-Radar-Recovery
          path: release/
          if-no-files-found: error
          retention-days: 30

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Deploy aligned SkyMap site
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record successful SkyMap 13 deployment
        uses: actions/github-script@v7
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        with:
          script: |
            const branch = 'build-receipts';
            const path = 'latest.json';
            const receipt = {
              version: '13.0-radar-recovery',
              commit: context.sha,
              runId: context.runId,
              runAttempt: Number(process.env.GITHUB_RUN_ATTEMPT),
              artifact: 'SkyMap-Ontario-v13.0-Radar-Recovery',
              apk: `${process.env.PAGE_URL}download/SkyMap-Ontario-v13.0-Radar-Recovery.apk`,
              page: process.env.PAGE_URL,
              completedAt: new Date().toISOString()
            };
            let current;
            try {
              current = await github.rest.repos.getContent({ ...context.repo, path, ref: branch });
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              ...context.repo,
              path,
              branch,
              message: `Record successful SkyMap Ontario 13 deployment ${context.runId}`,
              content: Buffer.from(`${JSON.stringify(receipt, null, 2)}\n`).toString('base64'),
              sha: current?.data?.sha
            });
