name: Validate, build and deploy SkyMap Ontario

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: skymap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate source files
        run: |
          node --check assets/site.js
          node --check app/app.js
          node --check app/sw.js
          node --check scripts/check-static-app.mjs
          node --check scripts/check-live-feeds.mjs
          test -f index.html
          test -f demo/index.html
          test -f app/index.html
          test -f app/app-base.css
          test -f app/app-responsive.css
          test -f app/vendor/leaflet.css
          test -f app/vendor/leaflet.js
          test -f privacy.html
          test -x gradlew
          test -f gradle/wrapper/gradle-wrapper.jar
          test -f gradle/wrapper/gradle-wrapper.properties
          node scripts/check-static-app.mjs
      - name: Verify live public feeds
        run: node scripts/check-live-feeds.mjs

  build-android:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"
      - uses: gradle/actions/setup-gradle@v4
      - name: Restore stable development signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: skymap-ontario-debug-keystore-v1
      - name: Prepare development signing key
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=SkyMap Ontario Development,O=RBT4,C=CA"
          fi
      - name: Build installable Android APK
        run: ./gradlew :android-app:assembleDebug --stacktrace --no-daemon
      - name: Name and checksum APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/android-app-debug.apk release/SkyMap-Ontario-v4.4.apk
          cd release
          sha256sum SkyMap-Ontario-v4.4.apk > SkyMap-Ontario-v4.4.apk.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: SkyMap-Ontario-v4.4
          path: release/
          if-no-files-found: error
          retention-days: 30

  deploy-pages:
    if: github.event_name != 'pull_request'
    needs: [validate, build-android]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: SkyMap-Ontario-v4.4
          path: release
      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/download
          rsync -a --exclude '.git' --exclude '.github' --exclude '.gradle' --exclude '.gradle-bootstrap-*' --exclude 'android' --exclude 'gradle' --exclude 'gradlew' --exclude 'gradlew.bat' --exclude 'build.gradle' --exclude 'settings.gradle' --exclude 'gradle.properties' --exclude 'release' --exclude '_site' ./ _site/
          cp release/SkyMap-Ontario-v4.4.apk _site/download/SkyMap-Ontario-v4.4.apk
          cp release/SkyMap-Ontario-v4.4.apk.sha256 _site/download/SkyMap-Ontario-v4.4.apk.sha256
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
