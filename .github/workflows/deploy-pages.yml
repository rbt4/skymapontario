name: Build SkyMap Ontario 7.1 Recovery

on:
  push:
    branches: [skymap-7-clarity-reset]
  pull_request:
  workflow_dispatch:

concurrency:
  group: skymap-recovery-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"
      - uses: gradle/actions/setup-gradle@v4
      - name: Restore stable development signing key
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: skymap-ontario-debug-keystore-v1
      - name: Prepare development signing key
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=SkyMap Ontario Development,O=RBT4,C=CA"
          fi
      - name: Validate bundled app
        run: |
          node --check app/app.js
          test -f app/index.html
          test -f app/app-base.css
          test -f app/app-responsive.css
          test -f app/icon.svg
          test -x gradlew
          test -f gradle/wrapper/gradle-wrapper.jar
      - name: Build Android APK through Gradle
        run: ./gradlew :android-app:assembleDebug --stacktrace --no-daemon
      - name: Verify APK signature and package
        run: |
          APK=android/app/build/outputs/apk/debug/android-app-debug.apk
          test -s "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/zipalign" -c -P 16 -v 4 "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | head -12
      - name: Prepare downloadable APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/android-app-debug.apk release/SkyMap-Ontario-v7.1-Recovery.apk
          cd release
          sha256sum SkyMap-Ontario-v7.1-Recovery.apk > SkyMap-Ontario-v7.1-Recovery.apk.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: SkyMap-Ontario-v7.1-Recovery
          path: release/
          if-no-files-found: error
          retention-days: 30
